# =====================================================================
# Railway config — Backend API service (Betinna.ai)
# Sprint 4 FIX 1
#
# Uso: criar Railway service apontando para o repo, root directory = /backend
# Railway lê este arquivo automaticamente.
# =====================================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Railway injeta PORT — main.ts já usa env.get('PORT')
#
# IMPORTANTE: startCommand AQUI sobrescreve o CMD do Dockerfile.
# `scripts/start.js` é compartilhado entre api E worker — escolhe entry baseado
# em SERVICE_TYPE env var:
#   - SERVICE_TYPE=api (default) → node dist/main.js (HTTP server)
#   - SERVICE_TYPE=worker → node dist/worker.js (background only, sem HTTP)
#
# Configurar no Railway dashboard:
#   - API service: SERVICE_TYPE=api (ou não setar, default é api)
#   - Worker service: SERVICE_TYPE=worker
startCommand = "node scripts/start.js"
# IMPORTANTE: healthcheckPath NÃO definido aqui — worker não tem HTTP server.
# API service deve configurar `Health Check Path: /api/v1/health` no dashboard
# Railway (Settings → Networking → Health Check). Worker fica sem healthcheck.
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
# Sleep aplicativo após 5min de inatividade? Mantenha desligado em prod —
# crons + BullMQ schedulers precisam de uptime contínuo.
# sleepApplication = false

[[deploy.regions]]
region = "us-east1-eqdc4a"
