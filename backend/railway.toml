# =====================================================================
# Railway config — Backend API service (Betinna.ai)
# Sprint 4 FIX 1
#
# Uso: criar Railway service apontando para o repo, root directory = /backend
# Railway lê este arquivo automaticamente.
# =====================================================================

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Railway injeta PORT — main.ts já usa env.get('PORT')
#
# IMPORTANTE: startCommand AQUI sobrescreve o CMD do Dockerfile.
# Mantemos a lógica do CMD do Dockerfile (deploy-migrations.js + start)
# replicada aqui pra garantir que rode quando Railway lê o railway.toml.
#
# Sem isso, migrations novas nunca eram aplicadas em prod (P2021 em Notificacao etc).
startCommand = "node scripts/deploy-migrations.js && node dist/main.js"
healthcheckPath = "/api/v1/health"
# Timeout ampliado: migrations + boot Nest podem levar 60-90s na primeira vez.
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
# Sleep aplicativo após 5min de inatividade? Mantenha desligado em prod —
# crons + BullMQ schedulers precisam de uptime contínuo.
# sleepApplication = false

[[deploy.regions]]
region = "us-east1-eqdc4a"
